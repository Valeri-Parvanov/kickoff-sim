<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>
<h1>&#129489; Players</h1>

<div class="add-new-bar" sec:authorize="isAuthenticated()">
    <a th:href="@{/players/form}" class="btn-add">Add new player</a>
</div>

<div class="table-wrapper">
<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th th:replace="~{fragments/sortable :: sortTh('/players', 'firstName', 'First name')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/players', 'lastName', 'Last name')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/players', 'shirtNumber', 'Shirt number')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/players', 'team', 'Team')}"></th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="player : ${players}">
        <td th:text="${player.firstName}"></td>
        <td th:text="${player.lastName}"></td>
        <td th:text="${player.shirtNumber}"></td>
        <td th:text="${player.teamName}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/players/{id}/form(id=${player.id})}">Edit</a>
            <form th:action="@{/players/{id}(id=${player.id})}" th:method="delete" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</div>
</main>
</body>
</html>
