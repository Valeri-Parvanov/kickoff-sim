<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Subscriptions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .sub-list { display: flex; flex-direction: column; gap: 0.65rem; margin-top: 0.5rem; }
        .sub-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.85rem 1.2rem;
            border-radius: 12px;
            background: var(--card-bg, #fff);
            box-shadow: 0 1px 5px rgba(0,0,0,.07);
        }
        .sub-left { display: flex; align-items: center; gap: 0.9rem; flex: 1; min-width: 0; }
        .sub-logo { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; }
        .sub-logo-placeholder {
            width: 42px; height: 42px; border-radius: 50%;
            background: #fef9c3; color: #b45309;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .sub-info { min-width: 0; }
        .sub-name {
            font-weight: 700;
            font-size: 0.98rem;
            color: var(--text);
            text-decoration: none;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sub-name:hover { text-decoration: underline; }
        .sub-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.3rem;
            align-items: center;
        }
        .sub-tag {
            font-size: 0.69rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 0.04em;
        }
        .sub-tag.team   { background: #dbeafe; color: #2563eb; }
        .sub-tag.league { background: #fef9c3; color: #b45309; }
        .sub-pill {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .sub-pill strong { color: var(--text); font-weight: 700; }
        .sub-league-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #16a34a;
            background: #dcfce7;
            padding: 2px 9px;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.13s ease, color 0.13s ease;
        }
        .sub-league-link:hover {
            background: #16a34a;
            color: #fff;
        }
        .no-sub { color: var(--muted); font-size: 0.93rem; padding: 1rem 0; }
        .no-sub a { color: var(--pitch); }
    </style>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">

<div th:replace="~{fragments/topbar :: messages}"></div>

<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">
    <h1 style="margin:0;">&#128276; My Subscriptions</h1>
    <a th:href="@{/notifications}" class="btn-back" style="font-size:0.8rem;">&#8592; Notifications</a>
</div>

<div class="sub-list" th:if="${!subscriptions.isEmpty()}">
    <div th:each="s : ${subscriptions}" class="sub-item">
        <div class="sub-left">
            <img th:if="${s.entityType() == 'TEAM'}"
                 th:src="@{/teams/{id}/logo(id=${s.entityId()})}"
                 class="sub-logo" alt=""/>
            <div th:unless="${s.entityType() == 'TEAM'}" class="sub-logo-placeholder">&#127942;</div>
            <div class="sub-info">
                <a th:href="${s.entityType() == 'TEAM'} ? '/teams/' + ${s.entityId()} : '/leagues/' + ${s.entityId()}"
                   class="sub-name"
                   th:text="${s.entityName()}"></a>
                <div class="sub-meta">
                    <span th:class="'sub-tag ' + (${s.entityType() == 'TEAM'} ? 'team' : 'league')"
                          th:text="${s.entityType() == 'TEAM'} ? 'Team' : 'League'"></span>
                    <a th:if="${s.leagueName() != null}"
                       th:href="@{/leagues/{id}(id=${s.leagueId()})}"
                       class="sub-league-link">
                        &#127942; <span th:text="${s.leagueName()}"></span>
                    </a>
                    <span class="sub-pill" th:if="${s.standingPosition() != null}">
                        &#127942; Position <strong th:text="${s.standingPosition()}"></strong>
                    </span>
                    <span class="sub-pill" th:if="${s.entityType() == 'TEAM'}">
                        &#9917; <strong th:text="${s.remainingMatches()}"></strong>
                        <span th:text="${s.remainingMatches() == 1} ? 'match remaining' : 'matches remaining'"></span>
                    </span>
                </div>
            </div>
        </div>
        <form th:action="@{/notifications/subscriptions/{id}(id=${s.subscriptionId()})}" method="post" style="flex-shrink:0;">
            <input type="hidden" name="_method" value="DELETE"/>
            <input type="hidden" name="returnUrl" value="/notifications/subscriptions"/>
            <button type="submit" class="btn-del" style="font-size:0.8rem;padding:5px 14px;">Unfollow</button>
        </form>
    </div>
</div>

<p th:if="${subscriptions.isEmpty()}" class="no-sub">
    You are not following any teams or leagues yet.<br/>
    Visit a <a th:href="@{/teams}">team</a> or <a th:href="@{/leagues}">league</a> page to follow it.
</p>

</main>
</body>
</html>
