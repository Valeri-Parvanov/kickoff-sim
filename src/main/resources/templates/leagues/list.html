<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Leagues</title>
</head>
<body>
<h1>Leagues</h1>

<p><a th:href="@{/}">Back to home</a></p>

<div sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/leagues/create}">Add new league</a>
</div>

<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Name</th>
        <th>Country</th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="league : ${leagues}">
        <td th:text="${league.name}"></td>
        <td th:text="${league.country}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/leagues/{id}/edit(id=${league.id})}">Edit</a>
            <form th:action="@{/leagues/{id}/delete(id=${league.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
