<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Leagues</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1>&#127942; Leagues</h1>


<div sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/leagues/create}">Add new league</a>
</div>

<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th th:replace="~{fragments/sortable :: sortTh('/leagues', 'name', 'Name')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/leagues', 'country', 'Country')}"></th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="league : ${leagues}">
        <td th:text="${league.name}"></td>
        <td th:text="${league.country}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/leagues/{id}/edit(id=${league.id})}">Edit</a>
            <form th:action="@{/leagues/{id}/delete(id=${league.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</main>
</body>
</html>
