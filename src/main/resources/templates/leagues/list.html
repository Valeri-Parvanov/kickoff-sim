<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leagues</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>
<h1>&#127942; Leagues</h1>

<div class="add-new-bar" sec:authorize="isAuthenticated()">
    <a th:href="@{/leagues/form}" class="btn-add">Add new league</a>
</div>

<div class="table-wrapper">
<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th th:replace="~{fragments/sortable :: sortTh('/leagues', 'name', 'Name')}"></th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="league : ${leagues}">
        <td><a th:href="@{/leagues/{id}(id=${league.id})}" th:text="${league.name}"></a></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/leagues/{id}/form(id=${league.id})}">Edit</a>
            <form th:action="@{/leagues/{id}(id=${league.id})}" th:method="delete" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</div>
</main>
</body>
</html>
