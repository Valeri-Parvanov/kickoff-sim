<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1 th:text="${leagueDto.id} ? 'Edit league' : 'Add league'"></h1>

<form th:action="${leagueDto.id} ? @{/leagues/{id}(id=${leagueDto.id})} : @{/leagues}"
      th:object="${leagueDto}" th:method="${leagueDto.id} ? 'put' : 'post'" class="card-form">

    <div>
        <label for="name">Name</label>
        <div class="input-row">
            <input type="text" id="name" th:field="*{name}"/>
            <button type="button" class="dice-btn" onclick="fillRandomLeagueName('name')" title="Generate random name">&#127922;</button>
        </div>
        <span style="color:red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div>
        <label for="country">Country</label>
        <div class="input-row">
            <input type="text" id="country" th:field="*{country}"/>
            <button type="button" class="dice-btn" onclick="fillRandomCountry('country')" title="Generate random country">&#127922;</button>
        </div>
        <span style="color:red" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></span>
    </div>

    <button type="submit">Save</button>
</form>

<p><a th:href="@{/leagues}" class="back-link">&#8592; Back to leagues</a></p>
</main>
<script th:src="@{/js/random-names.js}"></script>
</body>
</html>
