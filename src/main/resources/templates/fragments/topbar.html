<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="topbar">
<aside class="sidebar">
    <div class="sidebar-header">
        <a th:href="@{/}" class="sidebar-brand"><span class="ball">&#9917;</span>Kickoff Sim</a>
        <button class="hamburger-btn" id="sidebarToggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
    </div>

    <nav class="sidebar-nav">
        <div class="sidebar-section-label">Browse</div>
        <a th:href="@{/leagues}">&#127942; Leagues</a>
        <a th:href="@{/teams}">&#128737; Teams</a>
        <a th:href="@{/matches}">&#9917; Matches</a>

        <div class="sidebar-section-label" sec:authorize="isAuthenticated()">My Account</div>
        <a th:href="@{/feed}" sec:authorize="isAuthenticated()">&#127897; My Feed</a>
        <a th:href="@{/my-change-requests}" sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
            &#128221; My proposals
            <span th:if="${myPendingCount != null and myPendingCount > 0}"
                  class="nav-badge sidebar-badge" th:text="${myPendingCount}"></span>
        </a>
        <a th:href="@{/profile}" sec:authorize="isAuthenticated()">&#128100; My profile</a>

        <div class="sidebar-section-label sidebar-section-admin" sec:authorize="hasRole('ADMIN')">Administration</div>
        <a th:href="@{/admin/change-requests}" sec:authorize="hasRole('ADMIN')">
            &#128203; Pending changes
            <span th:if="${pendingChangeCount != null and pendingChangeCount > 0}"
                  class="nav-badge sidebar-badge" th:text="${pendingChangeCount}"></span>
        </a>
        <a th:href="@{/admin/users}" sec:authorize="hasRole('ADMIN')">&#9881; Users</a>
    </nav>

    <div class="sidebar-auth" sec:authorize="isAuthenticated()">
        <a th:href="@{/profile}" class="sidebar-welcome">
            Welcome, <strong sec:authentication="name"></strong>!
        </a>
        <div style="display:flex;gap:0.4rem;align-items:center;margin-top:0.2rem;">
            <span sec:authorize="hasRole('ADMIN')" class="topbar-role-badge tbr-admin">ADMIN</span>
            <span sec:authorize="!hasRole('ADMIN')" class="topbar-role-badge tbr-user">USER</span>
        </div>
        <form th:action="@{/logout}" method="post" style="margin-top:0.5rem;">
            <button type="submit" class="sidebar-logout">Logout</button>
        </form>
    </div>

    <div class="sidebar-auth" sec:authorize="isAnonymous()">
        <a th:href="@{/login}" class="sidebar-auth-link">Login</a>
        <a th:href="@{/register}" class="sidebar-auth-link">Register</a>
    </div>
</aside>

<div id="goal-toasts" class="goal-toast-wrap" sec:authorize="isAuthenticated()"></div>
<script>
(function() {
    var tz;
    try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch (e) { return; }
    if (!tz) return;
    var m = document.cookie.match(/(?:^|;\s*)tz=([^;]+)/);
    if (m && decodeURIComponent(m[1]) === tz) return;
    document.cookie = 'tz=' + encodeURIComponent(tz) + ';path=/;max-age=31536000;SameSite=Lax';
    location.reload();
}());
</script>
<script>
(function() {
    var btn = document.getElementById('sidebarToggle');
    var sidebar = document.querySelector('.sidebar');
    if (!btn || !sidebar) return;
    btn.addEventListener('click', function() {
        sidebar.classList.toggle('open');
    });
    sidebar.querySelectorAll('.sidebar-nav a').forEach(function(link) {
        link.addEventListener('click', function() { sidebar.classList.remove('open'); });
    });
}());
</script>
<script sec:authorize="isAuthenticated()">
(function() {
    var SHOWN_KEY = 'kickoffShownToasts';

    function shownIds() {
        try { return JSON.parse(localStorage.getItem(SHOWN_KEY) || '[]'); } catch (e) { return []; }
    }

    function remember(id) {
        var ids = shownIds();
        ids.push(id);
        if (ids.length > 50) ids = ids.slice(-50);
        try { localStorage.setItem(SHOWN_KEY, JSON.stringify(ids)); } catch (e) {}
    }

    var GOAL_TOAST_RE = /^GOAL for (.+?)!\s*(.+?)(?:\s\(assist:\s(.+?)\))?\s+(\d+)'(?:\s\((own goal|penalty)\))?\s+—\s+(.+?)\s+(\d+):(\d+)\s+(.+)$/;
    var STATUS_TOAST_RE = /^(.+?)\s+vs\s+(.+?)\s+—\s+(FULL TIME|HALF TIME|SECOND HALF)\s+(\d+)-(\d+)$/;
    var KICKOFF_TOAST_RE = /^(.+?)\s+vs\s+(.+?)\s+—\s+KICK OFF!$/;

    function showToast(message, type) {
        var wrap = document.getElementById('goal-toasts');
        if (!wrap) return;
        var el = document.createElement('div');
        el.className = 'goal-toast' + (type ? ' t-' + type.toLowerCase() : '');

        var body = document.createElement('div');
        body.className = 'goal-toast-body';

        var goalMatch = type === 'GOAL' ? message.match(GOAL_TOAST_RE) : null;
        if (goalMatch) {
            var team = goalMatch[1];
            var scorer = goalMatch[2];
            var assist = goalMatch[3];
            var minute = goalMatch[4];
            var flag = goalMatch[5];
            var homeTeam = goalMatch[6];
            var homeScore = goalMatch[7];
            var awayScore = goalMatch[8];
            var awayTeam = goalMatch[9];

            var teamLine = document.createElement('div');
            teamLine.className = 'goal-toast-team';
            teamLine.textContent = '⚽ ' + team;
            body.appendChild(teamLine);

            var matchLine = document.createElement('div');
            matchLine.className = 'goal-toast-match';
            matchLine.textContent = homeTeam + ' vs ' + awayTeam;
            body.appendChild(matchLine);

            var scoreLine = document.createElement('div');
            scoreLine.className = 'goal-toast-score';
            var homeIsScoring = team === homeTeam;
            var homeNum = document.createElement('span');
            homeNum.className = 'gts-num' + (homeIsScoring ? ' gts-hot' : '');
            homeNum.textContent = homeScore;
            var sep = document.createElement('span');
            sep.className = 'gts-sep';
            sep.textContent = ':';
            var awayNum = document.createElement('span');
            awayNum.className = 'gts-num' + (!homeIsScoring ? ' gts-hot' : '');
            awayNum.textContent = awayScore;
            scoreLine.appendChild(homeNum);
            scoreLine.appendChild(sep);
            scoreLine.appendChild(awayNum);
            body.appendChild(scoreLine);

            var scorerLine = document.createElement('div');
            scorerLine.className = 'goal-toast-scorer';
            scorerLine.appendChild(document.createTextNode(scorer + ' · ' + minute + '\''));
            if (flag) {
                var badge = document.createElement('span');
                badge.className = 'goal-type-badge ' + (flag === 'own goal' ? 'og' : 'pen');
                badge.textContent = flag === 'own goal' ? 'OG' : 'pen.';
                scorerLine.appendChild(document.createTextNode(' '));
                scorerLine.appendChild(badge);
            }
            body.appendChild(scorerLine);

            if (assist) {
                var assistLine = document.createElement('div');
                assistLine.className = 'goal-toast-assist';
                assistLine.textContent = 'assist: ' + assist;
                body.appendChild(assistLine);
            }
        } else if (type === 'MATCH_KICKOFF') {
            var kickoffMatch = message.match(KICKOFF_TOAST_RE);
            if (kickoffMatch) {
                var koHome = kickoffMatch[1];
                var koAway = kickoffMatch[2];

                var koStatusLine = document.createElement('div');
                koStatusLine.className = 'goal-toast-status';
                koStatusLine.textContent = '🟢 KICK OFF!';
                body.appendChild(koStatusLine);

                var koMatchLine = document.createElement('div');
                koMatchLine.className = 'goal-toast-scorer';
                koMatchLine.textContent = koHome + ' vs ' + koAway;
                body.appendChild(koMatchLine);
            } else {
                var koText = document.createElement('div');
                koText.className = 'goal-toast-msg';
                koText.textContent = message;
                body.appendChild(koText);
            }
        } else if (type === 'MATCH_HALFTIME' || type === 'MATCH_SECONDHALF' || type === 'MATCH_FULLTIME') {
            var statusMatch = message.match(STATUS_TOAST_RE);
            if (statusMatch) {
                var home = statusMatch[1];
                var away = statusMatch[2];
                var label = statusMatch[3];
                var hScore = statusMatch[4];
                var aScore = statusMatch[5];

                var statusIcon = label === 'FULL TIME' ? '🏁 ' : (label === 'SECOND HALF' ? '▶️ ' : '⏸ ');
                var statusLine = document.createElement('div');
                statusLine.className = 'goal-toast-status';
                statusLine.textContent = statusIcon + label;
                body.appendChild(statusLine);

                var matchLine = document.createElement('div');
                matchLine.className = 'goal-toast-scorer';
                matchLine.textContent = home + ' vs ' + away + ' · ' + hScore + ':' + aScore;
                body.appendChild(matchLine);
            } else {
                var statusText = document.createElement('div');
                statusText.className = 'goal-toast-msg';
                statusText.textContent = message;
                body.appendChild(statusText);
            }
        } else {
            var text = document.createElement('div');
            text.className = 'goal-toast-msg';
            text.textContent = message;
            body.appendChild(text);
        }

        var close = document.createElement('button');
        close.className = 'goal-toast-close';
        close.type = 'button';
        close.setAttribute('aria-label', 'Dismiss');
        close.textContent = '×';
        el.appendChild(body);
        el.appendChild(close);
        wrap.appendChild(el);
        requestAnimationFrame(function() { el.classList.add('show'); });

        var timer = setTimeout(dismiss, 30000);
        function dismiss() {
            clearTimeout(timer);
            el.classList.remove('show');
            setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
        }
        close.addEventListener('click', dismiss);
    }

    function toastKey(type, message) {
        return type + '|' + message;
    }

    function showIfNew(type, message) {
        if (!message) return;
        var key = toastKey(type, message);
        if (shownIds().indexOf(key) !== -1) return;
        remember(key);
        showToast(message, type);
    }

    function pollToasts() {
        fetch('/notifications/toasts')
            .then(function(r) { return r.ok ? r.json() : []; })
            .then(function(list) {
                if (!list || !list.length) return;
                list.forEach(function(n) { showIfNew(n.type, n.message); });
            })
            .catch(function() {});
    }

    function connectLiveStream() {
        if (!window.EventSource) return;
        var es = new EventSource('/notifications/stream');
        es.addEventListener('toast', function(e) {
            try {
                var data = JSON.parse(e.data);
                showIfNew(data.type, data.message);
            } catch (err) {}
        });
    }

    pollToasts();
    connectLiveStream();
    setInterval(pollToasts, 20000);
}());
</script>
<script sec:authorize="isAuthenticated()">
(function() {
    document.addEventListener('click', function(e) {
        var btn = e.target.closest ? e.target.closest('.match-star') : null;
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();

        var form = btn.closest('form');
        if (!form || btn.disabled) return;

        btn.disabled = true;
        fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
            .then(function(data) {
                btn.classList.toggle('followed', data.following);
                btn.setAttribute('aria-pressed', data.following);
                btn.title = data.following ? 'Stop following this match' : 'Follow this match';
            })
            .catch(function() {})
            .then(function() { btn.disabled = false; });
    }, true);
}());
</script>
</th:block>

<th:block th:fragment="messages">
    <div th:if="${statusMessage}" class="status-message" th:text="${statusMessage}"></div>
    <div th:if="${warnMessage}" class="warn-message" th:text="${warnMessage}"></div>
    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
    <div th:if="${scheduleError}" class="error-message" th:text="${scheduleError}"></div>
</th:block>

<th:block th:fragment="goalRow(m, g)">
    <div class="half-label" th:if="${g.firstInHalf}" th:attr="data-half=${g.half.name()}">
        <span th:text="${g.half.name() == 'FIRST' ? '1st Half' : '2nd Half'}"></span>
        <span class="half-score" th:if="${g.half.name() == 'FIRST'}"
              th:text="${m.homeHalfScore} + ':' + ${m.awayHalfScore}"></span>
        <span class="half-score" th:unless="${g.half.name() == 'FIRST'}"
              th:text="${m.homeScore - m.homeHalfScore} + ':' + ${m.awayScore - m.awayHalfScore}"></span>
    </div>
    <div class="timeline-row"
         th:attr="data-half=${g.half.name()},data-minute=${g.minute != null ? g.minute : 0},data-offset=${g.offsetSeconds != null ? g.offsetSeconds : 0}">
        <div class="tl-home">
            <th:block th:if="${g.homeGoal}">
                <span class="goal-icon">&#9917;</span>
                <span class="goal-minute" th:if="${g.minute != null}"
                      th:text="${(g.half.name() == 'FIRST' ? g.minute : g.minute + 20)} + '\'' + ' '"></span>
                <span class="goal-scorer-name" th:text="${g.scorerName}"></span>
                <span class="goal-type-badge og" th:if="${g.ownGoal}">OG</span>
                <span class="goal-type-badge pen" th:if="${g.penalty}">pen.</span>
                <span class="goal-assist" th:if="${g.assistantName != null}"
                      th:text="' (' + ${g.assistantName} + ')'"></span>
                <span class="running-score"
                      th:text="${g.runningHomeScore} + ':' + ${g.runningAwayScore}"></span>
            </th:block>
        </div>
        <div class="tl-away">
            <th:block th:unless="${g.homeGoal}">
                <span class="running-score"
                      th:text="${g.runningHomeScore} + ':' + ${g.runningAwayScore}"></span>
                <span class="goal-assist" th:if="${g.assistantName != null}"
                      th:text="'(' + ${g.assistantName} + ') '"></span>
                <span class="goal-scorer-name" th:text="${g.scorerName}"></span>
                <span class="goal-type-badge og" th:if="${g.ownGoal}">OG</span>
                <span class="goal-type-badge pen" th:if="${g.penalty}">pen.</span>
                <span class="goal-minute" th:if="${g.minute != null}"
                      th:text="' ' + ${(g.half.name() == 'FIRST' ? g.minute : g.minute + 20)} + '\''"></span>
                <span class="goal-icon">&#9917;</span>
            </th:block>
        </div>
    </div>
</th:block>

<th:block th:fragment="matchStar(matchId)"
          th:with="followed=${subscribedMatchIds != null and subscribedMatchIds.contains(matchId)}">
    <form sec:authorize="isAuthenticated()"
          th:action="@{/notifications/match/{id}/toggle(id=${matchId})}" method="post"
          class="match-star-form">
        <button type="submit" class="match-star"
                th:classappend="${followed} ? ' followed' : ''"
                th:title="${followed} ? 'Stop following this match' : 'Follow this match'"
                th:attr="aria-pressed=${followed}">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </button>
    </form>
</th:block>
</body>
</html>
