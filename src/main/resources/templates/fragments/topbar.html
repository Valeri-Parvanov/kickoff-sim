<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="topbar" class="topbar">
    <a th:href="@{/}" class="brand"><span class="ball">&#9917;</span>Kickoff Sim</a>

    <nav>
        <a th:href="@{/leagues}">&#127942; Leagues</a>
        <a th:href="@{/teams}">&#128737; Teams</a>
        <a th:href="@{/matches}">&#9917; Matches</a>
        <a th:href="@{/admin/change-requests}" sec:authorize="hasRole('ADMIN')">&#128203; Pending changes<span
                th:if="${pendingChangeCount != null and pendingChangeCount > 0}"
                class="nav-badge" th:text="${pendingChangeCount}"></span></a>
        <a th:href="@{/my-change-requests}" sec:authorize="isAuthenticated() and !hasRole('ADMIN')">&#128221; My proposals<span
                th:if="${myPendingCount != null and myPendingCount > 0}"
                class="nav-badge" th:text="${myPendingCount}"></span></a>
    </nav>

    <div class="auth-box" sec:authorize="isAnonymous()">
        <a th:href="@{/login}">Login</a>
        <a th:href="@{/register}">Register</a>
    </div>

    <div class="auth-box" sec:authorize="isAuthenticated()">
        <span class="welcome">Welcome, <span sec:authentication="name"></span>!</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit">Logout</button>
        </form>
    </div>
</header>

<th:block th:fragment="messages">
    <div th:if="${statusMessage}" class="status-message" th:text="${statusMessage}"></div>
    <div th:if="${warnMessage}" class="warn-message" th:text="${warnMessage}"></div>
    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
    <div th:if="${scheduleError}" class="error-message" th:text="${scheduleError}"></div>
</th:block>
</body>
</html>
