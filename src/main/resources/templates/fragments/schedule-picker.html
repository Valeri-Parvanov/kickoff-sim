<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="picker(teamCount)">
    <fieldset id="scheduleFieldset" th:attr="data-team-count=${teamCount != null ? teamCount : 0}"
              style="margin-top:16px;padding:12px;border:1px solid #ccc;border-radius:6px;">
        <legend style="font-weight:600;padding:0 6px;">Schedule start</legend>
        <p style="font-size:0.85rem;color:#555;margin:0 0 10px;">
            The schedule is generated automatically when the league is created.
            If you leave the date blank, Round 1 starts today.
        </p>
        <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <div>
                <label>Round 1 date</label>
                <input type="hidden" id="scheduleStartDate" th:field="*{scheduleStartDate}"/>
                <div id="lcSelLabel" class="cal-sel-label" style="min-height:1.4em;margin:4px 0 2px;"></div>
                <div id="leagueCalendar" class="match-calendar"></div>
            </div>
            <div>
                <label for="scheduleStartTimeSelect">First kick-off (default 11:00)</label><br/>
                <input type="hidden" th:field="*{scheduleStartTime}"/>
                <select id="scheduleStartTimeSelect" style="height:2.2rem;font-size:1rem;border:1px solid #ccc;border-radius:6px;padding:0 0.5rem;"></select>
                <div id="tzBanner" style="display:none;margin-top:10px;padding:10px 14px;border-radius:6px;background:#fffbeb;border-left:4px solid #d97706;border-top:1px solid #fcd34d;border-right:1px solid #fcd34d;border-bottom:1px solid #fcd34d;max-width:340px;">
                    <div style="display:flex;align-items:flex-start;gap:8px;">
                        <span style="font-size:1.15rem;line-height:1.2;color:#d97706;">&#9888;</span>
                        <div>
                            <div style="font-size:0.82rem;font-weight:600;color:#92400e;">Times are entered in Sofia time (UTC+3).</div>
                            <div id="tzLocalLine" style="display:none;font-size:0.82rem;color:#78350f;margin-top:3px;">First match will kick off at <strong><span id="tzBannerLocal"></span> your local time</strong>.</div>
                            <div id="lastMatchLine" style="display:none;font-size:0.82rem;color:#78350f;margin-top:3px;"></div>
                        </div>
                    </div>
                </div>
                <span style="color:red" th:if="${#fields.hasErrors('scheduleStartTime')}" th:errors="*{scheduleStartTime}"></span>
            </div>
        </div>
    </fieldset>

    <div id="scheduleOverflowModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:950;align-items:center;justify-content:center;">
        <div style="background:#ffffff;border-radius:14px;padding:1.75rem 2rem;max-width:420px;width:92%;box-shadow:0 8px 40px rgba(0,0,0,0.3);color:#111;">
            <h2 style="margin:0 0 0.75rem;font-size:1.1rem;font-weight:700;color:#b91c1c;">&#9888; This schedule won't fit</h2>
            <p id="scheduleOverflowText" style="margin:0 0 1.4rem;font-size:0.92rem;color:#333;line-height:1.5;"></p>
            <div style="display:flex;justify-content:flex-end;">
                <button type="button" id="scheduleOverflowOk" style="margin:0;">Got it, I&#8217;ll pick an earlier time</button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var hidden = document.getElementById('scheduleStartTime');
        var sel = document.getElementById('scheduleStartTimeSelect');
        var fieldset = document.getElementById('scheduleFieldset');
        var LATEST_MIN = 23 * 60 + 30;
        if (!hidden || !sel) return;

        function computeLastMatchInfo() {
            if (!fieldset) return null;
            var teamCount = parseInt(fieldset.getAttribute('data-team-count') || '0', 10);
            var matchesPerRound = Math.floor(teamCount / 2);
            if (!matchesPerRound || matchesPerRound <= 1) return null;
            var parts = sel.value.split(':');
            var startMin = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
            var lastMin = startMin + (matchesPerRound - 1) * 60;
            var lastStr = String(Math.floor((lastMin % 1440) / 60)).padStart(2, '0') + ':'
                + String(lastMin % 60).padStart(2, '0');
            return { matchesPerRound: matchesPerRound, lastTime: lastStr, overflow: lastMin > LATEST_MIN };
        }
        window.getScheduleLastMatchInfo = computeLastMatchInfo;

        var wasOverflowing = false;
        function showOverflowModal(info) {
            var modal = document.getElementById('scheduleOverflowModal');
            var text = document.getElementById('scheduleOverflowText');
            if (!modal || !text) return;
            text.textContent = 'With ' + info.matchesPerRound + ' matches per round, 1 hour apart, the last match of every '
                + 'round would kick off at ' + info.lastTime + ' Sofia time — after the 23:30 cutoff. Please pick an earlier kick-off time.';
            modal.style.display = 'flex';
        }
        function checkOverflowModal() {
            var info = computeLastMatchInfo();
            var overflow = !!(info && info.overflow);
            if (overflow && !wasOverflowing) showOverflowModal(info);
            wasOverflowing = overflow;
        }
        window.showScheduleOverflowModalIfNeeded = function() {
            var info = computeLastMatchInfo();
            if (info && info.overflow) {
                showOverflowModal(info);
                return true;
            }
            return false;
        };
        var overflowOkBtn = document.getElementById('scheduleOverflowOk');
        if (overflowOkBtn) {
            overflowOkBtn.addEventListener('click', function() {
                document.getElementById('scheduleOverflowModal').style.display = 'none';
            });
        }

        window.updateScheduleTeamCount = function(count) {
            if (fieldset) fieldset.setAttribute('data-team-count', count);
            updateInfoBox();
            checkOverflowModal();
        };
        for (var t = 8*60; t <= 23*60+30; t += 15) {
            var h = Math.floor(t/60), m = t%60;
            var lbl = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
            var opt = document.createElement('option');
            opt.value = lbl; opt.textContent = lbl;
            sel.appendChild(opt);
        }
        var cur = hidden.value ? hidden.value.substring(0,5) : '11:00';
        sel.value = cur;
        if (!sel.value) sel.value = '11:00';
        hidden.value = sel.value;

        var sofiaOffset = (function() {
            try {
                var d = new Date();
                var s = d.toLocaleString('sv', {timeZone: 'Europe/Sofia'});
                var u = d.toLocaleString('sv', {timeZone: 'UTC'});
                return Math.round((new Date(s) - new Date(u)) / 60000);
            } catch(e) { return 180; }
        })();
        var clientOffset = -new Date().getTimezoneOffset();
        var delta = sofiaOffset - clientOffset;

        function updateInfoBox() {
            var banner = document.getElementById('tzBanner');
            var bannerLocal = document.getElementById('tzBannerLocal');
            var localLine = document.getElementById('tzLocalLine');
            var lastMatchLine = document.getElementById('lastMatchLine');
            if (!banner) return;

            var showLocal = delta !== 0;
            if (showLocal) {
                var parts = sel.value.split(':');
                var sofiaMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
                var localMin = ((sofiaMin - delta) % 1440 + 1440) % 1440;
                var localStr = String(Math.floor(localMin / 60)).padStart(2, '0') + ':' + String(localMin % 60).padStart(2, '0');
                if (bannerLocal) bannerLocal.textContent = localStr;
                if (localLine) localLine.style.display = 'block';
            } else if (localLine) {
                localLine.style.display = 'none';
            }

            var info = computeLastMatchInfo();
            if (info && lastMatchLine) {
                lastMatchLine.textContent = 'Every round has ' + info.matchesPerRound + ' match' + (info.matchesPerRound === 1 ? '' : 'es')
                    + ', 1 hour apart — the last match of each round kicks off at ' + info.lastTime + ' Sofia time'
                    + (info.overflow ? '. That is past the 23:30 cutoff — pick an earlier kick-off time.' : '.');
                lastMatchLine.style.color = info.overflow ? '#b91c1c' : '#78350f';
                lastMatchLine.style.fontWeight = info.overflow ? '700' : '400';
                lastMatchLine.style.display = 'block';
            } else if (lastMatchLine) {
                lastMatchLine.style.display = 'none';
            }

            banner.style.display = (showLocal || info) ? 'block' : 'none';
        }
        sel.addEventListener('change', function() {
            hidden.value = sel.value;
            updateInfoBox();
            checkOverflowModal();
        });
        updateInfoBox();
        wasOverflowing = !!(computeLastMatchInfo() && computeLastMatchInfo().overflow);
    })();

    (function() {
        var hiddenDate = document.getElementById('scheduleStartDate');
        var cal = document.getElementById('leagueCalendar');
        var label = document.getElementById('lcSelLabel');
        if (!cal || !hiddenDate) return;

        var BG_MONTHS = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];
        var BG_DAYS   = ['Mo','Tu','We','Th','Fr','Sa','Su'];

        var now = new Date();
        var todayIso = now.getFullYear() + '-'
            + String(now.getMonth()+1).padStart(2,'0') + '-'
            + String(now.getDate()).padStart(2,'0');

        var selected = hiddenDate.value || '';
        var cur = (selected && selected.length >= 7) ? selected.substring(0,7) : todayIso.substring(0,7);

        function formatLabel(iso) {
            var p = iso.split('-');
            return p[2] + ' ' + BG_MONTHS[parseInt(p[1])-1] + ' ' + p[0];
        }

        function render() {
            var p = cur.split('-');
            var year = +p[0], month = +p[1];
            var first = new Date(year, month-1, 1);
            var days  = new Date(year, month, 0).getDate();
            var dow   = (first.getDay() + 6) % 7;

            var h = '<div class="cal-nav">';
            h += '<button type="button" class="cal-btn cal-prev">&#8249;</button>';
            h += '<span class="cal-month-title">' + BG_MONTHS[month-1] + ' ' + year + '</span>';
            h += '<button type="button" class="cal-btn cal-next">&#8250;</button>';
            h += '</div><div class="cal-grid">';
            BG_DAYS.forEach(function(d) { h += '<div class="cal-dh">' + d + '</div>'; });
            for (var i = 0; i < dow; i++) h += '<div class="cal-cell cal-empty"></div>';
            for (var day = 1; day <= days; day++) {
                var iso = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
                var cls = 'cal-cell cal-active'
                    + (iso === todayIso  ? ' cal-today'    : '')
                    + (iso === selected  ? ' cal-selected' : '');
                h += '<div class="' + cls + '"><a href="#" data-date="' + iso + '">' + day + '</a></div>';
            }
            h += '</div>';
            cal.innerHTML = h;
            label.textContent = selected ? formatLabel(selected) : '';

            cal.querySelector('.cal-prev').addEventListener('click', function() {
                var d = new Date(year, month-2, 1);
                cur = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
                render();
            });
            cal.querySelector('.cal-next').addEventListener('click', function() {
                var d = new Date(year, month, 1);
                cur = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
                render();
            });
            cal.querySelectorAll('[data-date]').forEach(function(a) {
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    selected = this.getAttribute('data-date');
                    hiddenDate.value = selected;
                    render();
                });
            });
        }

        render();
    })();
    </script>
</div>

</body>
</html>
