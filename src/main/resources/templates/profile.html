<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Kickoff Sim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>

<div class="profile-wrap">
    <div class="profile-header">
        <div class="profile-avatar" th:text="${#strings.substring(profileUsername, 0, 1).toUpperCase()}"></div>
        <div class="profile-info">
            <h1 th:text="${profileUsername}"></h1>
            <span class="profile-role-badge"
                  th:classappend="${userRole == 'ADMIN'} ? ' prbadge-admin' : ' prbadge-user'"
                  th:text="${userRole}"></span>
        </div>
    </div>

    <form th:action="@{/profile}" th:object="${profileDto}" method="post" class="card-form profile-form">
        <div>
            <label>Username</label>
            <input type="text" th:value="${profileUsername}" disabled class="input-disabled">
            <span class="field-hint">Username cannot be changed.</span>
        </div>
        <div>
            <label for="email">Email <span class="field-optional">(optional)</span></label>
            <input type="email" id="email" th:field="*{email}" autocomplete="email" placeholder="your@email.com">
            <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>
        <button type="submit" class="btn-save-profile">Save changes</button>
    </form>
</div>

</main>
</body>
</html>
