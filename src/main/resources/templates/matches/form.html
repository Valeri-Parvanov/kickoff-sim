<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1 th:text="${matchDto.id} ? 'Edit match' : 'Add match'"></h1>

<form th:action="${matchDto.id} ? @{/matches/{id}/edit(id=${matchDto.id})} : @{/matches/create}"
      th:object="${matchDto}" method="post" class="card-form">

    <div>
        <label for="homeTeamId">Home team</label>
        <select id="homeTeamId" th:field="*{homeTeamId}">
            <option value="">-- select home team --</option>
            <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"></option>
        </select>
        <span style="color:red" th:if="${#fields.hasErrors('homeTeamId')}" th:errors="*{homeTeamId}"></span>
    </div>

    <div>
        <label for="awayTeamId">Away team</label>
        <select id="awayTeamId" th:field="*{awayTeamId}">
            <option value="">-- select away team --</option>
            <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"></option>
        </select>
        <span style="color:red" th:if="${#fields.hasErrors('awayTeamId')}" th:errors="*{awayTeamId}"></span>
    </div>

    <div>
        <label for="playedAt">Played at</label>
        <input type="datetime-local" id="playedAt" th:field="*{playedAt}" step="1800"/>
        <span class="field-hint">Matches scheduled 08:00 – 23:30, every 30 minutes</span>
        <span style="color:red" id="timeError"></span>
        <span style="color:red" th:if="${#fields.hasErrors('playedAt')}" th:errors="*{playedAt}"></span>
    </div>

    <button type="submit">Save</button>
</form>

<script>
(function () {
    var input = document.getElementById('playedAt');
    var err   = document.getElementById('timeError');

    function validate() {
        if (!input.value) { err.textContent = ''; return; }
        var parts  = input.value.split('T');
        if (parts.length < 2) return;
        var timeParts = parts[1].split(':');
        var h = parseInt(timeParts[0], 10);
        var m = parseInt(timeParts[1], 10);
        var totalMin = h * 60 + m;
        if (totalMin < 8 * 60 || totalMin > 23 * 60 + 30) {
            err.textContent = 'Matches can only be scheduled between 08:00 and 23:30.';
        } else if (m !== 0 && m !== 30) {
            err.textContent = 'Please choose a time on the hour or half hour (:00 or :30).';
        } else {
            err.textContent = '';
        }
    }

    input.addEventListener('change', validate);
    input.addEventListener('input',  validate);
})();
</script>

<p><a th:href="@{/matches}" class="back-link">&#8592; Back to matches</a></p>
</main>
</body>
</html>
