<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1 th:text="${matchDto.id} ? 'Edit match' : 'Add match'"></h1>

<form th:action="${matchDto.id} ? @{/matches/{id}(id=${matchDto.id})} : @{/matches}"
      th:object="${matchDto}" th:method="${matchDto.id} ? 'put' : 'post'" class="card-form">

    <div>
        <label for="homeTeamId">Home team</label>
        <select id="homeTeamId" th:field="*{homeTeamId}">
            <option value="">-- select home team --</option>
            <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"></option>
        </select>
        <span style="color:red" th:if="${#fields.hasErrors('homeTeamId')}" th:errors="*{homeTeamId}"></span>
    </div>

    <div>
        <label for="awayTeamId">Away team</label>
        <select id="awayTeamId" th:field="*{awayTeamId}">
            <option value="">-- select away team --</option>
            <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"></option>
        </select>
        <span style="color:red" th:if="${#fields.hasErrors('awayTeamId')}" th:errors="*{awayTeamId}"></span>
    </div>

    <div>
        <label for="homeScore">Home score</label>
        <input type="number" id="homeScore" th:field="*{homeScore}" min="0" placeholder="0"/>
        <span style="color:red" th:if="${#fields.hasErrors('homeScore')}" th:errors="*{homeScore}"></span>
    </div>

    <div>
        <label for="awayScore">Away score</label>
        <input type="number" id="awayScore" th:field="*{awayScore}" min="0" placeholder="0"/>
        <span style="color:red" th:if="${#fields.hasErrors('awayScore')}" th:errors="*{awayScore}"></span>
    </div>

    <div>
        <label>Played at</label>
        <div class="input-row">
            <input type="date" id="datePart"/>
            <select id="timePart"></select>
        </div>
        <span class="field-hint">Matches scheduled 08:00 – 23:30, every 30 minutes</span>
        <input type="hidden" th:field="*{playedAt}" id="playedAt"/>
        <span style="color:red" th:if="${#fields.hasErrors('playedAt')}" th:errors="*{playedAt}"></span>
    </div>

    <button type="submit">Save</button>
</form>

<script>
(function () {
    var dateInput  = document.getElementById('datePart');
    var timeSelect = document.getElementById('timePart');
    var hidden     = document.getElementById('playedAt');

    for (var total = 8 * 60; total <= 23 * 60 + 30; total += 30) {
        var h   = Math.floor(total / 60);
        var m   = total % 60;
        var lbl = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        var opt = document.createElement('option');
        opt.value = lbl;
        opt.textContent = lbl;
        timeSelect.appendChild(opt);
    }

    if (hidden.value) {
        var parts = hidden.value.split('T');
        dateInput.value  = parts[0];
        timeSelect.value = parts[1] ? parts[1].substring(0, 5) : '08:00';
    } else {
        timeSelect.value = '08:00';
    }

    function combine() {
        if (dateInput.value) {
            hidden.value = dateInput.value + 'T' + timeSelect.value;
        }
    }

    dateInput.addEventListener('change', combine);
    timeSelect.addEventListener('change', combine);
})();
</script>

<p><a th:href="@{/matches}" class="back-link">&#8592; Back to matches</a></p>
</main>
</body>
</html>
