<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{goals.new.title}">Record Goal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1 th:text="'&#9917; ' + #{goals.new.title}">&#9917; Record Goal</h1>

<div class="goal-match-banner">
    <span class="goal-team" th:text="${match.homeTeamName}"></span>
    <span class="goal-score" th:text="${match.homeScore} + ' : ' + ${match.awayScore}"></span>
    <span class="goal-team" th:text="${match.awayTeamName}"></span>
</div>

<div th:replace="~{fragments/topbar :: messages}"></div>

<form th:action="@{/matches/{id}/goals(id=${match.id})}"
      th:object="${goalEventDto}" method="post" class="card-form">

    <div>
        <label for="minute" th:text="#{goals.minute}">Minute</label> <span class="field-hint" style="display:inline">(1&ndash;40)</span>
        <input type="number" id="minute" th:field="*{minute}" min="1" max="40" placeholder="e.g. 25" required/>
        <span style="color:red" th:if="${#fields.hasErrors('minute')}" th:errors="*{minute}"></span>
    </div>

    <div>
        <label for="scorerId" th:text="#{goals.scorer}">Scorer</label>
        <select id="scorerId" th:field="*{scorerId}">
            <option value="" th:text="#{goals.selectscorer}">-- select scorer --</option>
            <optgroup th:label="${match.homeTeamName}" data-team="home">
                <option th:each="p : ${homePlayers}"
                        th:value="${p.id}" data-team="home"
                        th:text="${p.shirtNumber} + '. ' + ${p.firstName} + ' ' + ${p.lastName}"></option>
            </optgroup>
            <optgroup th:label="${match.awayTeamName}" data-team="away">
                <option th:each="p : ${awayPlayers}"
                        th:value="${p.id}" data-team="away"
                        th:text="${p.shirtNumber} + '. ' + ${p.firstName} + ' ' + ${p.lastName}"></option>
            </optgroup>
        </select>
        <span style="color:red" th:if="${#fields.hasErrors('scorerId')}" th:errors="*{scorerId}"></span>
    </div>

    <div id="assistWrap">
        <label for="assistantId" th:text="#{goals.assist}">Assist</label> <span class="field-hint" style="display:inline" th:text="#{goals.assist.hint}">(optional, same team as scorer)</span>
        <select id="assistantId" th:field="*{assistantId}">
            <option value="" th:text="#{goals.noassist}">-- no assist --</option>
            <optgroup th:label="${match.homeTeamName}" data-team="home">
                <option th:each="p : ${homePlayers}"
                        th:value="${p.id}" data-team="home"
                        th:text="${p.shirtNumber} + '. ' + ${p.firstName} + ' ' + ${p.lastName}"></option>
            </optgroup>
            <optgroup th:label="${match.awayTeamName}" data-team="away">
                <option th:each="p : ${awayPlayers}"
                        th:value="${p.id}" data-team="away"
                        th:text="${p.shirtNumber} + '. ' + ${p.firstName} + ' ' + ${p.lastName}"></option>
            </optgroup>
        </select>
    </div>

    <div class="goal-flags">
        <label class="goal-flag-label">
            <input type="checkbox" id="ownGoal" th:field="*{ownGoal}"/>
            <span th:text="#{goals.owngoal}">Own goal (автогол)</span>
        </label>
        <label class="goal-flag-label">
            <input type="checkbox" th:field="*{penalty}"/>
            <span th:text="#{goals.penalty}">Penalty (дузпа)</span>
        </label>
    </div>

    <button type="submit" th:text="#{goals.savegoal}">Save Goal</button>
</form>

<p><a th:href="@{/matches}" class="back-link" th:text="'&#8592; ' + #{matches.backtomatches}">&#8592; Back to matches</a></p>
</main>
<script th:src="@{/js/goal-assist.js}"></script>
</body>
</html>
