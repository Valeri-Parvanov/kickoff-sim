<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${match.homeTeamName + ' vs ' + match.awayTeamName}">Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>
<div class="match-detail-wrap">

    <div class="match-detail-nav">
        <a th:href="@{/matches}" class="back-link" th:text="'&#8592; ' + #{matches.allmatches}">&#8592; All matches</a>
        <div class="match-detail-tags">
                <a class="match-league-tag" th:if="${match.leagueName}"
               th:href="@{/leagues/{id}(id=${match.leagueId})}"
               th:text="${match.leagueName}"></a>
            <span class="match-round-tag" th:if="${match.roundNumber != null}" th:text="#{matches.round} + ' ' + ${match.roundNumber}"></span>
        </div>
    </div>

    <div class="match-card">

        <div class="match-meta">
            <span class="match-date" th:attr="data-utc=${match.playedAtUtcIso}"></span>
        </div>

        <div class="match-scoreline">
            <span class="team-name home" th:text="${match.homeTeamName}"></span>
            <div class="score-block" th:if="${match.playedAt.isBefore(now) and match.playedAt.isAfter(liveThreshold)}"
                 th:attr="data-elapsed=${liveMatchForJs['elapsedMin']},data-match-id=${match.id}">
                <div class="ls-score-main"><span class="ls-h">-</span>&thinsp;:&thinsp;<span class="ls-a">-</span></div>
                <div class="live-badge" th:text="#{matches.live}">LIVE</div>
                <div class="live-minute"></div>
            </div>
            <div class="score-block" th:unless="${match.playedAt.isBefore(now) and match.playedAt.isAfter(liveThreshold)}">
                <div class="score-main"
                     th:text="${match.homeScore != null ? match.homeScore : '-'} + ' : ' + ${match.awayScore != null ? match.awayScore : '-'}"></div>
                <div class="score-ht"
                     th:if="${match.homeHalfScore != null}"
                     th:text="#{matches.ht} + ' ' + ${match.homeHalfScore} + ' – ' + ${match.awayHalfScore}"></div>
            </div>
            <span class="team-name away" th:text="${match.awayTeamName}"></span>
        </div>

        <div class="goal-timeline" th:if="${!match.goalTimeline.isEmpty()}">
            <th:block th:each="g : ${match.goalTimeline}">

                <div class="half-label" th:if="${g.firstInHalf}" th:attr="data-half=${g.half.name()}">
                    <span th:text="${g.half.name() == 'FIRST'} ? #{matches.half1} : #{matches.half2}"></span>
                    <span class="half-score" th:if="${g.half.name() == 'FIRST'}"
                          th:text="${match.homeHalfScore} + ':' + ${match.awayHalfScore}"></span>
                    <span class="half-score" th:unless="${g.half.name() == 'FIRST'}"
                          th:text="${match.homeScore - match.homeHalfScore} + ':' + ${match.awayScore - match.awayHalfScore}"></span>
                </div>

                <div class="timeline-row" th:attr="data-half=${g.half.name()},data-minute=${g.minute != null ? g.minute : 0},data-offset=${g.offsetSeconds != null ? g.offsetSeconds : 0}">
                    <div class="tl-home">
                        <th:block th:if="${g.homeGoal}">
                            <span class="goal-icon">&#9917;</span>
                            <span class="goal-minute" th:if="${g.minute != null}"
                                  th:text="${(g.half.name() == 'FIRST' ? g.minute : g.minute + 20)} + '\'' + ' '"></span>
                            <span class="goal-scorer-name" th:text="${g.scorerName}"></span>
                            <span class="goal-type-badge og" th:if="${g.ownGoal}" th:text="#{matches.og}">OG</span>
                            <span class="goal-type-badge pen" th:if="${g.penalty}" th:text="#{matches.pen}">pen.</span>
                            <span class="goal-assist" th:if="${g.assistantName != null}"
                                  th:text="' (' + ${g.assistantName} + ')'"></span>
                            <span class="running-score"
                                  th:text="${g.runningHomeScore} + ':' + ${g.runningAwayScore}"></span>
                        </th:block>
                    </div>
                    <div class="tl-away">
                        <th:block th:unless="${g.homeGoal}">
                            <span class="running-score"
                                  th:text="${g.runningHomeScore} + ':' + ${g.runningAwayScore}"></span>
                            <span class="goal-assist" th:if="${g.assistantName != null}"
                                  th:text="'(' + ${g.assistantName} + ') '"></span>
                            <span class="goal-scorer-name" th:text="${g.scorerName}"></span>
                            <span class="goal-type-badge og" th:if="${g.ownGoal}" th:text="#{matches.og}">OG</span>
                            <span class="goal-type-badge pen" th:if="${g.penalty}" th:text="#{matches.pen}">pen.</span>
                            <span class="goal-minute" th:if="${g.minute != null}"
                                  th:text="' ' + ${(g.half.name() == 'FIRST' ? g.minute : g.minute + 20)} + '\''"></span>
                            <span class="goal-icon">&#9917;</span>
                        </th:block>
                    </div>
                </div>

            </th:block>
        </div>

        <p th:if="${match.goalTimeline.isEmpty() and match.homeScore != null}"
           class="no-matches" style="margin:0.75rem 0 0;font-size:0.85rem;" th:text="#{matches.nogoalsrecordedmatch}">
            No goals recorded for this match.
        </p>


    </div>

    <div class="match-weather" th:if="${weatherForecast.isPresent()}">
        <span class="weather-icon">&#9925;</span>
        <span class="weather-label" th:text="#{matches.weather.forecastfor} + ' ' + ${match.homeTeamCity} + ':'"></span>
        <span class="weather-temp"
              th:text="${#numbers.formatDecimal(weatherForecast.get().minTempC,1,1)} + '&#176; / ' + ${#numbers.formatDecimal(weatherForecast.get().maxTempC,1,1)} + '&#176;C'"></span>
        <span class="weather-precip" th:if="${weatherForecast.get().precipitationProbability != null}"
              th:text="#{matches.weather.rainchance} + ' ' + ${weatherForecast.get().precipitationProbability} + '%'"></span>
    </div>

</div>
</main>
<script>
(function() {
    document.querySelectorAll('[data-utc]').forEach(function(el) {
        try {
            var d = new Date(el.dataset.utc);
            if (isNaN(d.getTime())) return;
            var fmt = el.dataset.fmt;
            if (fmt === 'time') {
                el.textContent = d.toLocaleTimeString(undefined, {hour:'2-digit',minute:'2-digit'});
            } else if (fmt === 'date') {
                el.textContent = d.toLocaleDateString(undefined, {day:'2-digit',month:'short',year:'numeric'});
            } else {
                el.textContent = d.toLocaleDateString(undefined, {day:'2-digit',month:'short',year:'numeric'})
                    + ', ' + d.toLocaleTimeString(undefined, {hour:'2-digit',minute:'2-digit'});
            }
        } catch(e) {}
    });
}());
</script>
<th:block th:if="${liveMatchForJs != null}">
<script th:inline="javascript">
var _LIVE = /*[[${liveMatchForJs}]]*/null;
var PAGE_LOAD_TIME = Date.now();
function formatClock(totalSec) {
    var s = Math.max(0, Math.floor(totalSec));
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}
function goalRevealSec(g) {
    var offset = g.offsetSeconds != null ? g.offsetSeconds : (g.minute != null ? (g.minute - 1) * 60 : 0);
    return g.half === 'FIRST' ? offset : 1500 + offset;
}
function getLiveState(elapsedSec, goals) {
    if (elapsedSec < 0) return { phase: 'PRE', displayMin: '', homeScore: 0, awayScore: 0, maxMin: 0 };
    var phase, maxMin;
    if (elapsedSec < 1200)      { phase = 'FIRST';  maxMin = Math.floor(elapsedSec / 60) + 1; }
    else if (elapsedSec < 1500) { phase = 'HT';     maxMin = 20; }
    else if (elapsedSec < 2700) { phase = 'SECOND'; maxMin = Math.floor((elapsedSec - 1500) / 60) + 1; }
    else                        { phase = 'FT';     maxMin = 20; }
    var hs = 0, as = 0, bestRevealSec = -1;
    for (var i = 0; i < goals.length; i++) {
        var g = goals[i];
        var revealSec = goalRevealSec(g);
        if (revealSec <= elapsedSec && revealSec > bestRevealSec) {
            bestRevealSec = revealSec;
            hs = g.rh; as = g.ra;
        }
    }
    var d;
    if (phase === 'FIRST')        d = formatClock(elapsedSec);
    else if (phase === 'HT')      d = 'HT';
    else if (phase === 'SECOND')  d = formatClock(1200 + (elapsedSec - 1500));
    else                          d = 'FT';
    return { phase: phase, displayMin: d, homeScore: hs, awayScore: as, maxMin: maxMin };
}
function updateLive() {
    if (!_LIVE) return;
    var el = document.querySelector('[data-match-id="' + _LIVE.id + '"]');
    if (!el) return;
    var baseSec = (_LIVE.elapsedSec != null) ? _LIVE.elapsedSec : _LIVE.elapsedMin * 60;
    var elapsedSec = baseSec + (Date.now() - PAGE_LOAD_TIME) / 1000;
    var st = getLiveState(elapsedSec, _LIVE.goals);
    var hEl = el.querySelector('.ls-h'), aEl = el.querySelector('.ls-a'), mEl = el.querySelector('.live-minute');
    if (hEl) hEl.textContent = st.homeScore;
    if (aEl) aEl.textContent = st.awayScore;
    if (mEl) mEl.textContent = st.displayMin;
    var inSecond = st.phase === 'SECOND' || st.phase === 'FT';
    document.querySelectorAll('.timeline-row').forEach(function(r) {
        var rHalf = r.dataset.half;
        var offset = parseInt(r.dataset.offset || '0');
        var revealSec = rHalf === 'FIRST' ? offset : 1500 + offset;
        r.style.display = revealSec <= elapsedSec ? '' : 'none';
    });
    var htScore = document.querySelector('.half-label[data-half="FIRST"] .half-score');
    if (htScore) htScore.style.display = st.phase !== 'FIRST' && st.phase !== 'PRE' ? '' : 'none';
    document.querySelectorAll('.half-label[data-half="SECOND"]').forEach(function(r) {
        r.style.display = inSecond ? '' : 'none';
    });
    var ht2Score = document.querySelector('.half-label[data-half="SECOND"] .half-score');
    if (ht2Score) ht2Score.style.display = st.phase === 'FT' ? '' : 'none';
}
updateLive();
setInterval(updateLive, 1000);
</script>
</th:block>
</body>
</html>
