<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${match.homeTeamName + ' vs ' + match.awayTeamName}">Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>
<div class="match-detail-wrap">

    <div class="match-detail-nav">
        <a th:href="@{/matches}" class="back-link">&#8592; All matches</a>
        <div class="match-detail-tags">
            <span class="match-league-tag" th:if="${match.leagueName}" th:text="${match.leagueName}"></span>
            <span class="match-round-tag" th:if="${match.roundNumber != null}" th:text="'Round ' + ${match.roundNumber}"></span>
        </div>
    </div>

    <div class="match-card">

        <div class="match-meta">
            <span class="match-date" th:text="${#temporals.format(match.playedAt, 'dd MMM yyyy, HH:mm')}"></span>
        </div>

        <div class="match-scoreline">
            <span class="team-name home" th:text="${match.homeTeamName}"></span>
            <div class="score-block" th:if="${match.playedAt.isBefore(now) and match.playedAt.isAfter(liveThreshold)}"
                 th:attr="data-kickoff=${#temporals.format(match.playedAt, 'yyyy-MM-dd HH:mm:ss')},data-match-id=${match.id}">
                <div class="ls-score-main"><span class="ls-h">-</span>&thinsp;:&thinsp;<span class="ls-a">-</span></div>
                <div class="live-badge">LIVE</div>
                <div class="live-minute"></div>
            </div>
            <div class="score-block" th:unless="${match.playedAt.isBefore(now) and match.playedAt.isAfter(liveThreshold)}">
                <div class="score-main"
                     th:text="${match.homeScore != null ? match.homeScore : '-'} + ' : ' + ${match.awayScore != null ? match.awayScore : '-'}"></div>
                <div class="score-ht"
                     th:if="${match.homeHalfScore != null}"
                     th:text="'HT ' + ${match.homeHalfScore} + ' – ' + ${match.awayHalfScore}"></div>
            </div>
            <span class="team-name away" th:text="${match.awayTeamName}"></span>
        </div>

        <div class="goal-timeline" th:if="${!match.goalTimeline.isEmpty()}">
            <th:block th:each="g : ${match.goalTimeline}">

                <div class="half-label" th:if="${g.firstInHalf}" th:attr="data-half=${g.half.name()}">
                    <span th:text="${g.half.name() == 'FIRST' ? '1st Half' : '2nd Half'}"></span>
                    <span class="half-score" th:if="${g.half.name() == 'FIRST'}"
                          th:text="${match.homeHalfScore} + ':' + ${match.awayHalfScore}"></span>
                    <span class="half-score" th:unless="${g.half.name() == 'FIRST'}"
                          th:text="${match.homeScore - match.homeHalfScore} + ':' + ${match.awayScore - match.awayHalfScore}"></span>
                </div>

                <div class="timeline-row" th:attr="data-half=${g.half.name()}">
                    <div class="tl-home">
                        <th:block th:if="${g.homeGoal}">
                            <span class="goal-icon">&#9917;</span>
                            <span class="goal-minute" th:if="${g.minute != null}"
                                  th:text="${(g.half.name() == 'FIRST' ? g.minute : g.minute + 20)} + '\'' + ' '"></span>
                            <span class="goal-scorer-name" th:text="${g.scorerName}"></span>
                            <span class="goal-type-badge og" th:if="${g.ownGoal}">OG</span>
                            <span class="goal-type-badge pen" th:if="${g.penalty}">pen.</span>
                            <span class="goal-assist" th:if="${g.assistantName != null}"
                                  th:text="' (' + ${g.assistantName} + ')'"></span>
                            <span class="running-score"
                                  th:text="${g.runningHomeScore} + ':' + ${g.runningAwayScore}"></span>
                            <span sec:authorize="hasRole('ADMIN')" style="margin-left:4px">
                                <a th:href="@{/matches/{mid}/goals/{gid}/form(mid=${match.id},gid=${g.id})}" class="btn-edit" style="font-size:0.75rem;padding:2px 8px">&#9998;</a>
                            </span>
                        </th:block>
                    </div>
                    <div class="tl-away">
                        <th:block th:unless="${g.homeGoal}">
                            <span sec:authorize="hasRole('ADMIN')" style="margin-right:4px">
                                <a th:href="@{/matches/{mid}/goals/{gid}/form(mid=${match.id},gid=${g.id})}" class="btn-edit" style="font-size:0.75rem;padding:2px 8px">&#9998;</a>
                            </span>
                            <span class="running-score"
                                  th:text="${g.runningHomeScore} + ':' + ${g.runningAwayScore}"></span>
                            <span class="goal-assist" th:if="${g.assistantName != null}"
                                  th:text="'(' + ${g.assistantName} + ') '"></span>
                            <span class="goal-scorer-name" th:text="${g.scorerName}"></span>
                            <span class="goal-type-badge og" th:if="${g.ownGoal}">OG</span>
                            <span class="goal-type-badge pen" th:if="${g.penalty}">pen.</span>
                            <span class="goal-minute" th:if="${g.minute != null}"
                                  th:text="' ' + ${(g.half.name() == 'FIRST' ? g.minute : g.minute + 20)} + '\''"></span>
                            <span class="goal-icon">&#9917;</span>
                        </th:block>
                    </div>
                </div>

            </th:block>
        </div>

        <p th:if="${match.goalTimeline.isEmpty() and match.homeScore != null}"
           class="no-matches" style="margin:0.75rem 0 0;font-size:0.85rem;">
            No goals recorded for this match.
        </p>

        <div class="match-actions" sec:authorize="isAuthenticated()">
            <a th:href="@{/matches/{id}/goals/form(id=${match.id})}" class="btn-goal" sec:authorize="hasRole('ADMIN')">+ Goal</a>
            <a th:href="@{/matches/{id}/form(id=${match.id})}" class="btn-edit">Edit</a>
            <form th:action="@{/matches/{id}(id=${match.id})}" th:method="delete" style="display:inline"
                  sec:authorize="hasRole('ADMIN')">
                <button type="submit" class="btn-del">Delete</button>
            </form>
        </div>

    </div>

</div>
</main>
<th:block th:if="${liveMatchForJs != null}">
<script th:inline="javascript">
var _LIVE = /*[[${liveMatchForJs}]]*/null;
var _reloadScheduled = false;
function getLiveState(kickoffStr, goals) {
    var kickoff = new Date(kickoffStr.replace(' ', 'T'));
    var realMin = Math.floor((Date.now() - kickoff.getTime()) / 60000);
    if (realMin < 0) return { phase: 'PRE', displayMin: '', homeScore: 0, awayScore: 0 };
    var phase, maxMin;
    if (realMin <= 20)      { phase = 'FIRST';  maxMin = realMin; }
    else if (realMin <= 25) { phase = 'HT';     maxMin = 20; }
    else if (realMin <= 45) { phase = 'SECOND'; maxMin = realMin - 25; }
    else                    { phase = 'FT';     maxMin = 20; }
    var hs = 0, as = 0;
    for (var i = 0; i < goals.length; i++) {
        var g = goals[i];
        if (g.half === 'FIRST') {
            if ((phase === 'FIRST' && g.minute <= maxMin) || phase === 'HT' || phase === 'SECOND' || phase === 'FT') {
                hs = g.rh; as = g.ra;
            }
        } else if (g.half === 'SECOND') {
            var secMax = phase === 'SECOND' ? maxMin : (phase === 'FT' ? 20 : -1);
            if (secMax >= 0 && g.minute <= secMax) { hs = g.rh; as = g.ra; }
        }
    }
    var d = phase === 'FIRST' ? realMin + "'" : phase === 'HT' ? 'HT' : phase === 'SECOND' ? (20 + (realMin - 25)) + "'" : 'FT';
    return { phase: phase, displayMin: d, homeScore: hs, awayScore: as };
}
function updateLive() {
    if (!_LIVE) return;
    var el = document.querySelector('[data-match-id="' + _LIVE.id + '"]');
    if (!el) return;
    var st = getLiveState(_LIVE.kickoff, _LIVE.goals);
    var hEl = el.querySelector('.ls-h'), aEl = el.querySelector('.ls-a'), mEl = el.querySelector('.live-minute');
    if (hEl) hEl.textContent = st.homeScore;
    if (aEl) aEl.textContent = st.awayScore;
    if (mEl) mEl.textContent = st.displayMin;
    if (st.displayMin === 'FT' && !_reloadScheduled) {
        _reloadScheduled = true;
        setTimeout(function() { location.reload(); }, 3000);
    }
    var showSecond = st.phase === 'SECOND' || st.phase === 'FT';
    document.querySelectorAll('[data-half="SECOND"]').forEach(function(r) {
        r.style.display = showSecond ? '' : 'none';
    });
}
updateLive();
setInterval(updateLive, 30000);
</script>
</th:block>
</body>
</html>
