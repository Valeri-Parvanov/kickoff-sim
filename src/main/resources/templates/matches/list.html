<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1>&#9917; Matches</h1>

<p th:if="${statusMessage}" th:text="${statusMessage}" class="status-message"></p>

<div class="add-new-bar" sec:authorize="isAuthenticated()">
    <a th:href="@{/matches/form}" class="btn-add">Add new match</a>
</div>

<div class="match-list">
    <div class="match-card" th:each="match : ${matches}">

        <div class="match-meta">
            <span class="match-date" th:text="${#temporals.format(match.playedAt, 'dd MMM yyyy, HH:mm')}"></span>
        </div>

        <div class="match-scoreline">
            <span class="team-name home" th:text="${match.homeTeamName}"></span>
            <div class="score-block">
                <div class="score-main"
                     th:text="${match.homeScore != null ? match.homeScore : '-'} + ' : ' + ${match.awayScore != null ? match.awayScore : '-'}"></div>
                <div class="score-ht"
                     th:if="${match.homeHalfScore != null}"
                     th:text="'HT ' + ${match.homeHalfScore} + ' – ' + ${match.awayHalfScore}"></div>
            </div>
            <span class="team-name away" th:text="${match.awayTeamName}"></span>
        </div>

        <div class="half-section"
             th:if="${!match.firstHalfHomeGoals.isEmpty() or !match.firstHalfAwayGoals.isEmpty()}">
            <div class="half-label">1st Half</div>
            <div class="match-goals">
                <div class="goals-col home-goals">
                    <div class="goal-event" th:each="g : ${match.firstHalfHomeGoals}">
                        <span class="goal-icon">&#9917;</span>
                        <span th:if="${g.minute != null}" th:text="${g.minute} + '\'' + ' '" class="goal-minute"></span>
                        <span th:text="${g.scorerName}"></span>
                        <span th:if="${g.assistantName != null}" class="goal-assist"
                              th:text="'(' + ${g.assistantName} + ')'"></span>
                        <span sec:authorize="hasRole('ADMIN')" style="margin-left:6px">
                            <a th:href="@{/matches/{mid}/goals/{gid}/form(mid=${match.id},gid=${g.id})}" class="btn-edit" style="font-size:0.75rem;padding:2px 8px">&#9998;</a>
                            <form th:action="@{/matches/{mid}/goals/{gid}(mid=${match.id},gid=${g.id})}" th:method="delete" style="display:inline">
                                <button type="submit" class="btn-del" style="font-size:0.75rem;padding:2px 8px">&#10005;</button>
                            </form>
                        </span>
                    </div>
                </div>
                <div class="goals-col away-goals">
                    <div class="goal-event" th:each="g : ${match.firstHalfAwayGoals}">
                        <span sec:authorize="hasRole('ADMIN')" style="margin-right:6px">
                            <a th:href="@{/matches/{mid}/goals/{gid}/form(mid=${match.id},gid=${g.id})}" class="btn-edit" style="font-size:0.75rem;padding:2px 8px">&#9998;</a>
                            <form th:action="@{/matches/{mid}/goals/{gid}(mid=${match.id},gid=${g.id})}" th:method="delete" style="display:inline">
                                <button type="submit" class="btn-del" style="font-size:0.75rem;padding:2px 8px">&#10005;</button>
                            </form>
                        </span>
                        <span class="goal-assist" th:if="${g.assistantName != null}"
                              th:text="'(' + ${g.assistantName} + ') '"></span>
                        <span th:text="${g.scorerName}"></span>
                        <span th:if="${g.minute != null}" th:text="' ' + ${g.minute} + '\''" class="goal-minute"></span>
                        <span class="goal-icon">&#9917;</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="half-section"
             th:if="${!match.secondHalfHomeGoals.isEmpty() or !match.secondHalfAwayGoals.isEmpty()}">
            <div class="half-label">2nd Half</div>
            <div class="match-goals">
                <div class="goals-col home-goals">
                    <div class="goal-event" th:each="g : ${match.secondHalfHomeGoals}">
                        <span class="goal-icon">&#9917;</span>
                        <span th:if="${g.minute != null}" th:text="${g.minute + 20} + '\'' + ' '" class="goal-minute"></span>
                        <span th:text="${g.scorerName}"></span>
                        <span th:if="${g.assistantName != null}" class="goal-assist"
                              th:text="'(' + ${g.assistantName} + ')'"></span>
                        <span sec:authorize="hasRole('ADMIN')" style="margin-left:6px">
                            <a th:href="@{/matches/{mid}/goals/{gid}/form(mid=${match.id},gid=${g.id})}" class="btn-edit" style="font-size:0.75rem;padding:2px 8px">&#9998;</a>
                            <form th:action="@{/matches/{mid}/goals/{gid}(mid=${match.id},gid=${g.id})}" th:method="delete" style="display:inline">
                                <button type="submit" class="btn-del" style="font-size:0.75rem;padding:2px 8px">&#10005;</button>
                            </form>
                        </span>
                    </div>
                </div>
                <div class="goals-col away-goals">
                    <div class="goal-event" th:each="g : ${match.secondHalfAwayGoals}">
                        <span sec:authorize="hasRole('ADMIN')" style="margin-right:6px">
                            <a th:href="@{/matches/{mid}/goals/{gid}/form(mid=${match.id},gid=${g.id})}" class="btn-edit" style="font-size:0.75rem;padding:2px 8px">&#9998;</a>
                            <form th:action="@{/matches/{mid}/goals/{gid}(mid=${match.id},gid=${g.id})}" th:method="delete" style="display:inline">
                                <button type="submit" class="btn-del" style="font-size:0.75rem;padding:2px 8px">&#10005;</button>
                            </form>
                        </span>
                        <span class="goal-assist" th:if="${g.assistantName != null}"
                              th:text="'(' + ${g.assistantName} + ') '"></span>
                        <span th:text="${g.scorerName}"></span>
                        <span th:if="${g.minute != null}" th:text="' ' + ${g.minute + 20} + '\''" class="goal-minute"></span>
                        <span class="goal-icon">&#9917;</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="match-actions" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/matches/{id}/goals/form(id=${match.id})}" class="btn-goal">+ Goal</a>
            <a th:href="@{/matches/{id}/form(id=${match.id})}" class="btn-edit">Edit</a>
            <form th:action="@{/matches/{id}(id=${match.id})}" th:method="delete" style="display:inline">
                <button type="submit" class="btn-del">Delete</button>
            </form>
        </div>

    </div>

    <p th:if="${matches.isEmpty()}" class="no-matches">No matches recorded yet.</p>
</div>

</main>
</body>
</html>
