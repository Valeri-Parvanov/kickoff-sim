<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>
<h1>&#9917; Matches</h1>

<div class="ls-filter-bar">
    <form method="get" th:action="@{/matches}" style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
        <span class="ls-filter-label">Tournament</span>
        <select name="league" class="ls-filter-select" onchange="this.form.submit()">
            <option value="" th:selected="${selectedLeague == null}">All tournaments</option>
            <option th:each="l : ${leagues}" th:value="${l.id}" th:text="${l.name}"
                    th:selected="${l.id != null and l.id.equals(selectedLeague)}"></option>
        </select>
        <span class="ls-filter-label" style="margin-left:0.5rem;">Date</span>
        <select name="date" class="ls-filter-select" onchange="this.form.submit()">
            <option value="" th:selected="${selectedDate == null}">All dates</option>
            <option th:each="d : ${matchDates}" th:value="${d}" th:text="${#temporals.format(d, 'dd MMM yyyy')}"
                    th:selected="${d.equals(selectedDate)}"></option>
        </select>
    </form>
    <span th:if="${selectedTeam != null}" class="ls-team-chip">
        <span th:text="${selectedTeamName}"></span>
        <a th:href="@{/matches(league=${selectedLeague},date=${selectedDate})}" class="ls-chip-clear">&#10005;</a>
    </span>
    <a th:href="@{/matches}" th:if="${selectedLeague != null or selectedDate != null or selectedTeam != null}" class="ls-clear-filter">&#10005; Clear filters</a>
    <div style="margin-left:auto;" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/matches/form}" class="btn-add">Add new match</a>
    </div>
</div>

<!-- ── TEAM STANDINGS PANEL ── -->
<div th:if="${teamStandings != null and not #lists.isEmpty(teamStandings.?[played > 0])}"
     class="team-standings-panel">
    <div class="standings-panel-header">
        Standings &mdash;
        <a th:href="@{/leagues/{id}(id=${teamLeagueId})}" th:text="${teamLeagueName}"></a>
    </div>
    <div class="table-wrapper">
        <table border="1" cellpadding="6">
            <thead>
                <tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr>
            </thead>
            <tbody>
                <tr th:each="row, stat : ${teamStandings}"
                    th:classappend="${row.teamId != null and row.teamId == selectedTeam} ? 'standings-highlight' : ''">
                    <td th:text="${stat.index + 1}"></td>
                    <td>
                        <img th:src="@{/teams/{id}/logo(id=${row.teamId})}" class="team-logo-sm" alt=""/>
                        <a th:href="@{/teams/{id}(id=${row.teamId})}"
                           th:text="${row.teamName + (row.teamCity != null ? ' (' + row.teamCity + ')' : '')}"></a>
                    </td>
                    <td th:text="${row.played}"></td>
                    <td th:text="${row.wins}"></td>
                    <td th:text="${row.draws}"></td>
                    <td th:text="${row.losses}"></td>
                    <td th:text="${row.goalDiff}"></td>
                    <td><strong th:text="${row.points}"></strong></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- ── RESULTS ── -->
<div th:if="${!recentMatches.isEmpty()}">
    <div class="ls-section-header ls-results-header">&#127955; Results</div>
    <div class="match-list">
        <th:block th:each="match, stat : ${recentMatches}">

            <div class="round-divider"
                 th:if="${match.roundNumber != null and (stat.first or match.roundNumber != recentMatches[stat.index - 1].roundNumber)}"
                 th:text="'Round ' + ${match.roundNumber}"></div>

            <details class="match-card">
                <summary class="match-card-summary">
                    <div class="match-meta">
                        <a class="match-league-tag" th:if="${match.leagueId != null}"
                           th:href="@{/leagues/{id}(id=${match.leagueId})}"
                           th:text="${match.leagueName}"></a>
                        <span class="match-date" th:text="${#temporals.format(match.playedAt, 'dd MMM yyyy, HH:mm')}"></span>
                    </div>
                    <div class="match-scoreline">
                        <a class="team-name home" th:href="@{/teams/{id}(id=${match.homeTeamId})}">
                            <span th:text="${match.homeTeamName + (match.homeTeamCity != null ? ' (' + match.homeTeamCity + ')' : '')}"></span>
                            <img th:src="@{/teams/{id}/logo(id=${match.homeTeamId})}" class="match-logo" alt=""/>
                        </a>
                        <div class="score-block" th:if="${!match.playedAt.isAfter(liveThreshold)}">
                            <div class="score-main"
                                 th:text="${match.homeScore != null ? match.homeScore : '-'} + ' : ' + ${match.awayScore != null ? match.awayScore : '-'}"></div>
                            <div class="score-ht"
                                 th:if="${match.homeHalfScore != null}"
                                 th:text="'HT ' + ${match.homeHalfScore} + ' – ' + ${match.awayHalfScore}"></div>
                        </div>
                        <div class="score-block"
                             th:unless="${!match.playedAt.isAfter(liveThreshold)}"
                             th:attr="data-kickoff=${#temporals.format(match.playedAt, 'yyyy-MM-dd HH:mm:ss')}">
                            <div class="live-badge">LIVE</div>
                            <div class="live-minute"></div>
                        </div>
                        <a class="team-name away" th:href="@{/teams/{id}(id=${match.awayTeamId})}">
                            <img th:src="@{/teams/{id}/logo(id=${match.awayTeamId})}" class="match-logo" alt=""/>
                            <span th:text="${match.awayTeamName + (match.awayTeamCity != null ? ' (' + match.awayTeamCity + ')' : '')}"></span>
                        </a>
                    </div>
                    <div class="match-expand-hint">&#9662; details</div>
                </summary>

                <div class="match-card-expand">

                    <div class="goal-timeline" th:if="${!match.goalTimeline.isEmpty()}">
                        <th:block th:each="g : ${match.goalTimeline}">

                            <div class="half-label" th:if="${g.firstInHalf}">
                                <span th:text="${g.half.name() == 'FIRST' ? '1st Half' : '2nd Half'}"></span>
                                <span class="half-score" th:if="${g.half.name() == 'FIRST'}"
                                      th:text="${match.homeHalfScore} + ':' + ${match.awayHalfScore}"></span>
                                <span class="half-score" th:unless="${g.half.name() == 'FIRST'}"
                                      th:text="${match.homeScore - match.homeHalfScore} + ':' + ${match.awayScore - match.awayHalfScore}"></span>
                            </div>

                            <div class="timeline-row">
                                <div class="tl-home">
                                    <th:block th:if="${g.homeGoal}">
                                        <span class="goal-icon">&#9917;</span>
                                        <span class="goal-minute" th:if="${g.minute != null}"
                                              th:text="${(g.half.name() == 'FIRST' ? g.minute : g.minute + 20)} + '\'' + ' '"></span>
                                        <span th:text="${g.scorerName}"></span>
                                        <span class="goal-type-badge og" th:if="${g.ownGoal}">OG</span>
                                        <span class="goal-type-badge pen" th:if="${g.penalty}">pen.</span>
                                        <span class="goal-assist" th:if="${g.assistantName != null}"
                                              th:text="' (' + ${g.assistantName} + ')'"></span>
                                        <span class="running-score"
                                              th:text="${g.runningHomeScore} + ':' + ${g.runningAwayScore}"></span>
                                        <span sec:authorize="hasRole('ADMIN')" style="margin-left:4px">
                                            <a th:href="@{/matches/{mid}/goals/{gid}/form(mid=${match.id},gid=${g.id})}" class="btn-edit" style="font-size:0.75rem;padding:2px 8px">&#9998;</a>
                                            <form th:action="@{/matches/{mid}/goals/{gid}(mid=${match.id},gid=${g.id})}" th:method="delete" style="display:inline">
                                                <button type="submit" class="btn-del" style="font-size:0.75rem;padding:2px 8px">&#10005;</button>
                                            </form>
                                        </span>
                                    </th:block>
                                </div>
                                <div class="tl-away">
                                    <th:block th:unless="${g.homeGoal}">
                                        <span sec:authorize="hasRole('ADMIN')" style="margin-right:4px">
                                            <a th:href="@{/matches/{mid}/goals/{gid}/form(mid=${match.id},gid=${g.id})}" class="btn-edit" style="font-size:0.75rem;padding:2px 8px">&#9998;</a>
                                            <form th:action="@{/matches/{mid}/goals/{gid}(mid=${match.id},gid=${g.id})}" th:method="delete" style="display:inline">
                                                <button type="submit" class="btn-del" style="font-size:0.75rem;padding:2px 8px">&#10005;</button>
                                            </form>
                                        </span>
                                        <span class="running-score"
                                              th:text="${g.runningHomeScore} + ':' + ${g.runningAwayScore}"></span>
                                        <span class="goal-assist" th:if="${g.assistantName != null}"
                                              th:text="'(' + ${g.assistantName} + ') '"></span>
                                        <span th:text="${g.scorerName}"></span>
                                        <span class="goal-type-badge og" th:if="${g.ownGoal}">OG</span>
                                        <span class="goal-type-badge pen" th:if="${g.penalty}">pen.</span>
                                        <span class="goal-minute" th:if="${g.minute != null}"
                                              th:text="' ' + ${(g.half.name() == 'FIRST' ? g.minute : g.minute + 20)} + '\''"></span>
                                        <span class="goal-icon">&#9917;</span>
                                    </th:block>
                                </div>
                            </div>

                        </th:block>
                    </div>

                    <p th:if="${match.goalTimeline.isEmpty()}" style="font-size:0.82rem;color:var(--muted);margin:0.4rem 0 0;text-align:center;">
                        No goals recorded.
                    </p>


                </div>
            </details>

        </th:block>
    </div>
</div>

<!-- ── UPCOMING ── -->
<div th:if="${!upcomingMatches.isEmpty()}" th:style="${!recentMatches.isEmpty()} ? 'margin-top:1rem' : ''">
    <div class="ls-section-header ls-upcoming-header">&#128197; Upcoming</div>
    <div class="match-list">
        <th:block th:each="match, stat : ${upcomingMatches}">

            <div class="round-divider"
                 th:if="${match.roundNumber != null and (stat.first or match.roundNumber != upcomingMatches[stat.index - 1].roundNumber)}"
                 th:text="'Round ' + ${match.roundNumber}"></div>

            <div class="match-card upcoming">
                <div class="match-meta">
                    <a class="match-league-tag" th:if="${match.leagueId != null}"
                       th:href="@{/leagues/{id}(id=${match.leagueId})}"
                       th:text="${match.leagueName}"></a>
                </div>
                <div class="match-scoreline">
                    <a class="team-name home" th:href="@{/teams/{id}(id=${match.homeTeamId})}">
                        <span th:text="${match.homeTeamName + (match.homeTeamCity != null ? ' (' + match.homeTeamCity + ')' : '')}"></span>
                        <img th:src="@{/teams/{id}/logo(id=${match.homeTeamId})}" class="match-logo" alt=""/>
                    </a>
                    <div class="score-block">
                        <div class="upcoming-time" th:text="${#temporals.format(match.playedAt, 'HH:mm')}"></div>
                        <div class="upcoming-date" th:text="${#temporals.format(match.playedAt, 'dd MMM yyyy')}"></div>
                    </div>
                    <a class="team-name away" th:href="@{/teams/{id}(id=${match.awayTeamId})}">
                        <img th:src="@{/teams/{id}/logo(id=${match.awayTeamId})}" class="match-logo" alt=""/>
                        <span th:text="${match.awayTeamName + (match.awayTeamCity != null ? ' (' + match.awayTeamCity + ')' : '')}"></span>
                    </a>
                </div>
            </div>

        </th:block>
    </div>
</div>

<p th:if="${upcomingMatches.isEmpty() and recentMatches.isEmpty()}" class="no-matches">
    No matches found<span th:if="${selectedLeague != null or selectedDate != null or selectedTeam != null}"> for the selected filters</span>.
</p>

</main>
<script>
function updateLiveMinutes() {
    document.querySelectorAll('[data-kickoff]').forEach(function(el) {
        var raw = el.getAttribute('data-kickoff').replace(' ', 'T');
        var kickoff = new Date(raw);
        var minute = Math.floor((Date.now() - kickoff.getTime()) / 60000);
        var minEl = el.querySelector('.live-minute');
        if (minEl) minEl.textContent = minute + "'";
    });
}
updateLiveMinutes();
setInterval(updateLiveMinutes, 30000);
</script>
</body>
</html>
