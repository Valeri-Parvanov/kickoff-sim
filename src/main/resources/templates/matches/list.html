<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Matches</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1>&#9917; Matches</h1>


<div sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/matches/create}">Add new match</a>
</div>

<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th th:replace="~{fragments/sortable :: sortTh('/matches', 'homeTeam', 'Home team')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/matches', 'awayTeam', 'Away team')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/matches', 'homeScore', 'Score')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/matches', 'playedAt', 'Played at')}"></th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="match : ${matches}">
        <td th:text="${match.homeTeamName}"></td>
        <td th:text="${match.awayTeamName}"></td>
        <td th:text="${match.homeScore} + ' : ' + ${match.awayScore}"></td>
        <td th:text="${match.playedAt}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/matches/{id}/edit(id=${match.id})}">Edit</a>
            <form th:action="@{/matches/{id}/delete(id=${match.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</main>
</body>
</html>
