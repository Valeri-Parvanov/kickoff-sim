<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Teams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1>&#128737; Teams</h1>


<div sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/teams/create}">Add new team</a>
</div>

<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th th:replace="~{fragments/sortable :: sortTh('/teams', 'name', 'Name')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/teams', 'city', 'City')}"></th>
        <th th:replace="~{fragments/sortable :: sortTh('/teams', 'league', 'League')}"></th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="team : ${teams}">
        <td th:text="${team.name}"></td>
        <td th:text="${team.city}"></td>
        <td th:text="${team.leagueName}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/teams/{id}/edit(id=${team.id})}">Edit</a>
            <form th:action="@{/teams/{id}/delete(id=${team.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</main>
</body>
</html>
