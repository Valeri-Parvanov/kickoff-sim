<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add squad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<h1>&#128101; Add squad</h1>
<p>Fill in players for <strong th:text="${team.name}"></strong>. You can add up to
    <strong th:text="${remaining}"></strong> more player(s). Leave rows empty to skip them.</p>

<div th:if="${remaining <= 0}">
    <p class="status-message">This team already has a full squad (12 players).</p>
    <p><a th:href="@{/teams}" class="back-link">&#8592; Back to teams</a></p>
</div>

<div th:if="${remaining > 0}">
    <form th:action="@{/teams/{id}/squad(id=${team.id})}" th:object="${squadForm}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}" style="color:red; margin-bottom:12px; font-weight:600">
            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
        </div>

        <button type="button" class="btn-add" onclick="randomizeAllSquad()"
                style="margin-bottom:1rem">&#127922; Randomize all names</button>

        <div class="table-wrapper">
        <table border="1" cellpadding="6">
            <thead>
            <tr>
                <th>#</th>
                <th>Shirt no.</th>
                <th>First name</th>
                <th>Last name</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row, stat : *{rows}">
                <td th:text="${stat.count}">1</td>
                <td>
                    <input type="number" min="1" max="99"
                           th:field="*{rows[__${stat.index}__].shirtNumber}"/>
                    <span style="color:red"
                          th:if="${#fields.hasErrors('rows[__${stat.index}__].shirtNumber')}"
                          th:errors="*{rows[__${stat.index}__].shirtNumber}"></span>
                </td>
                <td>
                    <input type="text" class="js-firstname"
                           th:field="*{rows[__${stat.index}__].firstName}"/>
                    <span style="color:red"
                          th:if="${#fields.hasErrors('rows[__${stat.index}__].firstName')}"
                          th:errors="*{rows[__${stat.index}__].firstName}"></span>
                </td>
                <td>
                    <input type="text" class="js-lastname"
                           th:field="*{rows[__${stat.index}__].lastName}"/>
                    <span style="color:red"
                          th:if="${#fields.hasErrors('rows[__${stat.index}__].lastName')}"
                          th:errors="*{rows[__${stat.index}__].lastName}"></span>
                </td>
            </tr>
            </tbody>
        </table>
        </div>

        <button type="submit" style="margin-top:1rem">Save squad</button>
    </form>

    <p><a th:href="@{/teams}" class="back-link">&#8592; Back to teams</a></p>
</div>
</main>
<script th:src="@{/js/random-names.js}"></script>
</body>
</html>
