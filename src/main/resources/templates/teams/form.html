<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>
<h1 th:text="${teamDto.id} ? 'Edit team' : 'Add team'"></h1>

<form th:action="${teamDto.id} ? @{/teams/{id}(id=${teamDto.id},fromRequest=${fromRequest})} : @{/teams(fromRequest=${fromRequest})}"
      th:object="${teamDto}" th:method="${teamDto.id} ? 'put' : 'post'" class="card-form">

    <div>
        <label for="name">Name</label>
        <div class="input-row" th:if="${teamDto.id == null}">
            <input type="text" id="name" th:field="*{name}"/>
            <button type="button" class="dice-btn" onclick="fillRandomTeamName('name')" title="Generate random name">&#127922;</button>
        </div>
        <div th:if="${teamDto.id != null}">
            <input type="text" id="name" th:field="*{name}" readonly class="input-disabled"/>
            <span class="field-hint" style="display:block;margin-top:0.3rem">Team name cannot be changed after creation.</span>
        </div>
        <span style="color:red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div>
        <label for="city">City</label>
        <div class="input-row">
            <input type="text" id="city" th:field="*{city}"/>
            <button type="button" class="dice-btn" onclick="fillRandomCity('city')" title="Generate random city">&#127922;</button>
        </div>
        <span style="color:red" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></span>
    </div>

    <button type="submit">Save</button>
</form>

<p><a th:href="@{/teams}" class="back-link">&#8592; Back to teams</a></p>
</main>
<script th:src="@{/js/random-names.js}"></script>
</body>
</html>
