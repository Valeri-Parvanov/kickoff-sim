<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>
<h1 style="text-align:center">&#128737; Add team</h1>
<p style="text-align:center;color:var(--muted);max-width:580px;margin:0 auto 0.75rem">Fill in the team name, city, and squad. Leave unused rows empty.</p>
<div th:if="${teamCreateForm.teamId == null}" style="max-width:760px;margin:0 auto 1.25rem;padding:0.95rem 1.2rem;background:rgba(59,130,246,0.08);border:2px solid rgba(59,130,246,0.45);border-radius:8px;font-size:1rem;font-weight:600;line-height:1.5;color:var(--fg);">
    &#9917; To create a team, a minimum of <strong>6 players</strong> is required (maximum 12).
</div>

<form th:action="@{/teams(fromRequest=${fromRequest})}" th:object="${teamCreateForm}" method="post" class="card-form" style="max-width:760px">
    <input type="hidden" th:field="*{teamId}"/>

    <div th:if="${#fields.hasGlobalErrors()}" style="color:red; margin-bottom:12px; font-weight:600">
        <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
    </div>

    <div>
        <label for="name">Name</label>
        <div class="input-row">
            <input type="text" id="name" th:field="*{name}"/>
            <button type="button" class="dice-btn" onclick="fillRandomTeamName('name')" title="Generate random name">&#127922;</button>
        </div>
        <span style="color:red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div>
        <label for="city">City</label>
        <div class="input-row">
            <input type="text" id="city" th:field="*{city}"/>
            <button type="button" class="dice-btn" onclick="fillRandomCity('city')" title="Generate random city">&#127922;</button>
        </div>
        <span style="color:red" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></span>
    </div>

    <div>
        <label>Squad <span class="field-hint" style="display:inline">(minimum 6, maximum 12 players)</span></label>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin:0.3rem 0 0.8rem">
            <button type="button" class="btn-add" onclick="randomizeAllSquad()">&#127922; Full squad (12)</button>
            <button type="button" class="btn-goal" onclick="randomizeMinSquad()" th:unless="${teamCreateForm.teamId != null}">&#127922; Min squad (6)</button>
            <button type="button" class="btn-add" onclick="randomizeOneRow()" th:if="${teamCreateForm.teamId != null}">&#127922; + 1 player</button>
            <button type="submit" style="margin-left:auto">&#10003; Save</button>
        </div>

        <div class="table-wrapper">
        <table border="1" cellpadding="6">
            <thead>
            <tr>
                <th>#</th>
                <th>Shirt no.</th>
                <th>First name</th>
                <th>Last name</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row, stat : *{players}">
                <td th:text="${stat.count}">1</td>
                <td>
                    <input type="number" min="1" max="99"
                           th:field="*{players[__${stat.index}__].shirtNumber}"/>
                    <span style="color:red"
                          th:if="${#fields.hasErrors('players[__${stat.index}__].shirtNumber')}"
                          th:errors="*{players[__${stat.index}__].shirtNumber}"></span>
                </td>
                <td>
                    <input type="text" class="js-firstname"
                           th:field="*{players[__${stat.index}__].firstName}"/>
                    <span style="color:red"
                          th:if="${#fields.hasErrors('players[__${stat.index}__].firstName')}"
                          th:errors="*{players[__${stat.index}__].firstName}"></span>
                </td>
                <td>
                    <input type="text" class="js-lastname"
                           th:field="*{players[__${stat.index}__].lastName}"/>
                    <span style="color:red"
                          th:if="${#fields.hasErrors('players[__${stat.index}__].lastName')}"
                          th:errors="*{players[__${stat.index}__].lastName}"></span>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>

    <button type="submit">Save</button>
</form>

<p><a th:href="@{/teams}" class="back-link">&#8592; Back to teams</a></p>
</main>
<script th:src="@{/js/random-names.js}"></script>
</body>
</html>
