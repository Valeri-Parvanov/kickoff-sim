<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Football League Manager</title>
</head>
<body>
<h1>Register</h1>

<form th:action="@{/register}" th:object="${registerDto}" method="post">
    <div>
        <label for="username">Username</label>
        <input type="text" id="username" th:field="*{username}">
        <span style="color: red" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
    </div>
    <div>
        <label for="password">Password</label>
        <input type="password" id="password" th:field="*{password}">
        <span style="color: red" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </div>
    <div>
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" th:field="*{confirmPassword}">
        <span style="color: red" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
    </div>
    <button type="submit">Register</button>
</form>

<p>Already have an account? <a th:href="@{/login}">Login</a></p>
</body>
</html>
