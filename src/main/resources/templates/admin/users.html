<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.users.title} + ' - Kickoff Sim'">User Management - Kickoff Sim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>

<main class="page">
<div th:replace="~{fragments/topbar :: messages}"></div>
<h1 th:text="'&#128101; ' + #{admin.users.title}">&#128101; User Management</h1>
<p class="section-meta" th:text="#{admin.users.total} + ' ' + ${totalUsers} + ' ' + #{admin.users.usersword} + ' · ' + ${adminCount} + ' ' + #{admin.users.adminsword}"></p>

<div class="table-wrapper">
<table class="data-table">
    <thead>
        <tr>
            <th th:text="#{admin.users.username}">Username</th>
            <th th:text="#{admin.users.email}">Email</th>
            <th th:text="#{admin.users.role}">Role</th>
            <th th:text="#{common.actions}">Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="u : ${users}">
            <td>
                <span th:text="${u.username}"></span>
                <span th:if="${#authentication.name == u.username}" class="you-badge" th:text="#{admin.users.you}">YOU</span>
            </td>
            <td th:text="${u.email != null ? u.email : '—'}"></td>
            <td>
                <span class="role-badge"
                      th:classappend="${u.role.name() == 'ADMIN'} ? ' rb-admin' : ' rb-user'"
                      th:text="${u.role}"></span>
            </td>
            <td class="user-role-actions">
                <form th:if="${u.role.name() == 'USER'}"
                      th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" style="display:inline">
                    <input type="hidden" name="newRole" value="ADMIN"/>
                    <input type="hidden" name="targetUsername" th:value="${u.username}"/>
                    <button type="submit" class="btn-approve" th:text="#{admin.users.promote}">Promote to Admin</button>
                </form>
                <form th:if="${u.role.name() == 'ADMIN'}"
                      th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" style="display:inline">
                    <input type="hidden" name="newRole" value="USER"/>
                    <input type="hidden" name="targetUsername" th:value="${u.username}"/>
                    <button type="submit" class="btn-del"
                            th:disabled="${adminCount <= 1}"
                            th:title="${adminCount <= 1} ? #{admin.users.lastadmin} : ''" th:text="#{admin.users.demote}">Demote to User</button>
                </form>
            </td>
        </tr>
    </tbody>
</table>
</div>

<div th:if="${totalPages > 1}" class="pagination-bar">
    <a th:if="${currentPage > 0}"
       th:href="@{/admin/users(page=${currentPage - 1})}"
       class="page-btn" th:text="'&lsaquo; ' + #{admin.users.prev}">&lsaquo; Prev</a>
    <span th:each="p : ${pageNumbers}">
        <span th:if="${p == -1}" class="page-ellipsis">&#8230;</span>
        <a th:if="${p != -1 and p != currentPage}"
           th:href="@{/admin/users(page=${p})}"
           class="page-btn" th:text="${p + 1}"></a>
        <span th:if="${p != -1 and p == currentPage}"
              class="page-btn page-btn-active" th:text="${p + 1}"></span>
    </span>
    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/admin/users(page=${currentPage + 1})}"
       class="page-btn" th:text="#{admin.users.next} + ' &rsaquo;'">Next &rsaquo;</a>
</div>

</main>
</body>
</html>
